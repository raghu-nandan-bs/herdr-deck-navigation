<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>herdr · card navigator — carousel concept</title>
<style>
  :root{
    --base:#1e1e2e; --mantle:#181825; --crust:#11111b;
    --surface0:#313244; --surface1:#45475a; --surface2:#585b70;
    --overlay0:#6c7086; --overlay1:#7f849c;
    --subtext0:#a6adc8; --subtext1:#bac2de; --text:#cdd6f4;
    --red:#f38ba8; --green:#a6e3a1; --yellow:#f9e2af;
    --teal:#94e2d5; --blue:#89b4fa; --peach:#fab387; --mauve:#cba6f7;
    --accent:#fab387;
    --mono:"SF Mono","JetBrains Mono","Fira Code",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:#0c0c14; color:var(--text);
    font-family:var(--mono); font-size:13.5px; line-height:1.55;
    display:flex; align-items:center; justify-content:center;
    padding:26px; -webkit-font-smoothing:antialiased;
  }
  .term{
    width:min(1180px,100%); background:var(--base);
    border:1px solid #2a2a3c; border-radius:8px; overflow:hidden;
    box-shadow:0 24px 70px rgba(0,0,0,.55); display:flex; flex-direction:column;
  }
  .titlebar{background:var(--mantle); border-bottom:1px solid #2a2a3c; padding:8px 12px;
    display:flex; align-items:center; gap:8px; color:var(--overlay1); font-size:12px}
  .dot{width:11px;height:11px;border-radius:50%}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .titlebar .t{margin-left:8px}
  .titlebar .spacer{flex:1}
  .titlebar .badge{color:var(--overlay0)}

  .panel{padding:14px 16px 12px; display:flex; flex-direction:column; min-height:580px}
  .search{display:flex; align-items:center; gap:2px; color:var(--overlay0);
    padding:2px 4px 10px; border-bottom:1px solid var(--surface1)}
  .search .slash{color:var(--accent); font-weight:700}
  .search .spacer{flex:1}
  .filters{display:flex; gap:6px; margin-left:10px}
  .chip{color:var(--overlay0); padding:0 6px; border-radius:4px}
  .chip.on{color:var(--base); font-weight:700}
  .chip[data-k="b"].on{background:var(--red)} .chip[data-k="w"].on{background:var(--yellow)}
  .chip[data-k="i"].on{background:var(--green)} .chip[data-k="d"].on{background:var(--teal)}

  /* pager dots */
  .pager{display:flex; justify-content:center; gap:8px; margin-top:12px}
  .pager .pd{display:flex; align-items:center; gap:5px; color:var(--overlay0); font-size:12px;
    padding:2px 8px; border-radius:20px; border:1px solid transparent}
  .pager .pd.on{color:var(--text); border-color:var(--surface2); background:var(--mantle)}
  .pager .pd .s{width:8px;height:8px;border-radius:50%}

  /* carousel stage */
  .stage{position:relative; flex:1; margin-top:10px; overflow:hidden}
  .track{position:absolute; top:0; bottom:0; left:0; display:flex; align-items:center; gap:26px;
    transition:transform .26s cubic-bezier(.33,1,.68,1)}
  .card{
    flex:0 0 400px; align-self:center; height:88%;
    background:var(--mantle); border:1px solid var(--surface1); border-radius:8px;
    display:flex; flex-direction:column; overflow:hidden;
    transform:scale(.8); opacity:.4; filter:saturate(.7);
    transition:transform .26s cubic-bezier(.33,1,.68,1), opacity .26s, border-color .2s, box-shadow .2s;
  }
  .card.center{transform:scale(1); opacity:1; filter:none; border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent), 0 18px 44px rgba(0,0,0,.5); height:100%}

  .card .head{display:flex; align-items:center; gap:8px; padding:11px 13px;
    border-bottom:1px solid var(--surface0); position:relative}
  .card .stripe{position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--surface2)}
  .card.center .stripe{width:4px}
  .card .wsname{font-weight:700; color:var(--subtext1); font-size:15px}
  .card.center .wsname{color:var(--text)}
  .card .cur{color:var(--accent)}
  .card .headspace{flex:1}
  .card .panecount{color:var(--overlay0); font-size:12px}

  .rollup{display:flex; gap:11px; padding:7px 13px; border-bottom:1px solid var(--surface0); font-size:12.5px}
  .rollup .r{display:flex; align-items:center; gap:3px; color:var(--overlay0)}
  .rollup .r.z{opacity:.28}

  .body{flex:1; overflow-y:auto; padding:6px 5px 8px; scrollbar-width:thin; scrollbar-color:var(--surface2) transparent}
  .body::-webkit-scrollbar{width:6px}
  .body::-webkit-scrollbar-thumb{background:var(--surface2); border-radius:3px}

  .row{display:flex; align-items:center; gap:7px; padding:3px 10px 3px 10px; border-radius:5px; white-space:nowrap}
  .row .arrow{width:10px; text-align:center; color:transparent}
  .row .tw{width:12px; text-align:center; color:var(--overlay0)}
  .row .glyph{width:12px; text-align:center}
  .row .lbl{flex:1; overflow:hidden; text-overflow:ellipsis}
  .row .meta{color:var(--overlay0); font-size:12px; padding-left:8px}
  .row.tab .lbl{color:var(--subtext0); font-weight:600}
  .row.pane{padding-left:24px}
  .row.pane .lbl{color:var(--subtext0)}
  .row.current .lbl{color:var(--text); font-weight:700}
  .card.center .row.sel{background:var(--accent)}
  .card.center .row.sel .tw,.card.center .row.sel .glyph,.card.center .row.sel .lbl,
  .card.center .row.sel .meta,.card.center .row.sel .arrow{color:var(--base); font-weight:700}

  .g-block{color:var(--red)} .g-work{color:var(--yellow)}
  .g-done{color:var(--teal)} .g-idle{color:var(--green)} .g-unknown{color:var(--overlay0)}

  .detail{margin-top:10px; padding:7px 4px 9px; border-top:1px solid var(--surface1);
    color:var(--overlay0); font-size:12px; min-height:18px}
  .detail b{color:var(--subtext1); font-weight:600}
  .footer{display:flex; flex-wrap:wrap; gap:14px; padding:6px 4px 2px; color:var(--overlay0); font-size:12px}
  .footer k{color:var(--accent); font-weight:700; font-style:normal}

  .flash{position:fixed; left:50%; bottom:34px; transform:translateX(-50%) translateY(14px);
    background:var(--surface0); color:var(--text); border:1px solid var(--surface2);
    padding:8px 16px; border-radius:6px; opacity:0; transition:.2s; pointer-events:none; z-index:20}
  .flash.on{opacity:1; transform:translateX(-50%) translateY(0)}
  .flash b{color:var(--accent)}
  .hint{max-width:1180px; margin:16px auto 0; color:#6c7086; font-size:12.5px; text-align:center; line-height:1.7}
  .hint kbd{background:#20202e; border:1px solid #33334a; border-bottom-width:2px; border-radius:4px; padding:1px 7px; color:#bac2de; font-family:var(--mono); font-size:11.5px}
</style>
</head>
<body>
<div style="width:min(1180px,100%)">
  <div class="term">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="t">herdr — workspace navigator</span>
      <span class="spacer"></span>
      <span class="badge">ctrl b + g · carousel concept</span>
    </div>
    <div class="panel">
      <div class="search">
        <span class="slash">/&nbsp;</span><span>search panes</span>
        <span class="filters">
          <span class="chip" data-k="b">blocked</span><span class="chip" data-k="w">working</span>
          <span class="chip" data-k="i">idle</span><span class="chip" data-k="d">done</span>
        </span>
        <span class="spacer"></span><span id="paneCount">22 panes</span>
      </div>

      <div class="pager" id="pager"></div>
      <div class="stage"><div class="track" id="track"></div></div>

      <div class="detail" id="detail"></div>
      <div class="footer">
        <span><k>enter</k> switch</span><span><k>/</k> search</span>
        <span><k>b/w/i/d</k> filter</span><span><k>← →</k> workspace</span>
        <span><k>↑ ↓</k> pane</span><span><k>esc</k> close</span>
      </div>
    </div>
  </div>
</div>
<div class="flash" id="flash"></div>
<div class="hint">
  Carousel variant — <kbd>←</kbd> <kbd>→</kbd> rotate focused workspace ·
  <kbd>↑</kbd> <kbd>↓</kbd> / <kbd>j</kbd> <kbd>k</kbd> move within the focused card ·
  <kbd>Enter</kbd> switch · <kbd>b</kbd>/<kbd>w</kbd>/<kbd>i</kbd>/<kbd>d</kbd> filter
</div>

<script>
const S = { block:{g:"◉",c:"g-block",label:"blocked"}, work:{g:"◍",c:"g-work",label:"working"},
            done:{g:"●",c:"g-done",label:"done"}, idle:{g:"✓",c:"g-idle",label:"idle"},
            unknown:{g:"○",c:"g-unknown",label:"shell"} };
const WORKSPACES = [
  { name:"api", tabs:[
    {name:"1", panes:[{n:"pane 1", s:"unknown", meta:"shell"}]},
    {name:"api-cdx", panes:[{n:"pane 2", s:"work", meta:"working"}]},
    {name:"api", panes:[{n:"nvim", s:"idle", meta:"idle"}]},
    {name:"build", panes:[{n:"pane 8", s:"done", meta:"done"},{n:"pane 9", s:"work", meta:"working"}]},
  ]},
  { name:"web", current:true, tabs:[
    {name:"1", panes:[{n:"pane 2", s:"idle", meta:"idle"}]},
    {name:"worker", panes:[{n:"pane 3", s:"work", meta:"working"}]},
    {name:"3", panes:[{n:"pane 4", s:"unknown", meta:"shell"}]},
    {name:"backend", panes:[{n:"pane 5", s:"done", meta:"done"}]},
    {name:"backend", panes:[{n:"pane 6", s:"idle", meta:"idle"}]},
    {name:"debug", panes:[{n:"pane 7", s:"block", meta:"blocked", current:true},{n:"pane 8", s:"work", meta:"working"}]},
    {name:"7", panes:[{n:"pane 9", s:"done", meta:"done"},{n:"pane 10", s:"unknown", meta:"shell"}]},
  ]},
  { name:"infra", tabs:[
    {name:"1", panes:[{n:"pane 4", s:"idle", meta:"idle"}]},
    {name:"nvim", panes:[{n:"pane 2", s:"unknown", meta:"shell"}]},
  ]},
  { name:"infra", tabs:[
    {name:"deploy", panes:[{n:"pane 1", s:"work", meta:"working"}]},
    {name:"logs", panes:[{n:"pane 2", s:"done", meta:"done"}]},
    {name:"tf-plan", panes:[{n:"pane 3", s:"block", meta:"blocked"}]},
  ]},
  { name:"docs", tabs:[
    {name:"site", panes:[{n:"nvim", s:"idle", meta:"idle"}]},
    {name:"preview", panes:[{n:"pane 2", s:"unknown", meta:"shell"}]},
  ]},
];
const RANK={block:0,work:1,done:2,idle:3,unknown:4};
const STRIPE={block:"var(--red)",work:"var(--yellow)",done:"var(--teal)",idle:"var(--green)",unknown:"var(--surface2)"};

let active=1, sel=[], filter=null;
function rowsFor(ws){const rows=[];ws.tabs.forEach(t=>{rows.push({type:"tab",label:t.name,meta:t.panes.length+"p",s:worst(t.panes)});t.panes.forEach(p=>rows.push({type:"pane",label:p.n,meta:p.meta,s:p.s,current:p.current}));});return rows;}
function worst(p){return p.map(x=>x.s).sort((a,b)=>RANK[a]-RANK[b])[0];}
function counts(ws){const c={block:0,work:0,done:0,idle:0,unknown:0};ws.tabs.forEach(t=>t.panes.forEach(p=>c[p.s]++));return c;}
function worstOf(c){if(c.block)return"block";if(c.work)return"work";if(c.done)return"done";if(c.idle)return"idle";return"unknown";}
function rollupItem(k,n){const g=S[k];return `<span class="r ${n?'':'z'}"><span class="${g.c}">${g.g}</span>${n}</span>`;}

const track=document.getElementById("track"), pager=document.getElementById("pager"), detailEl=document.getElementById("detail");

function build(){
  track.innerHTML="";
  WORKSPACES.forEach((ws,wi)=>{
    if(sel[wi]===undefined){const rr=rowsFor(ws);let i=rr.findIndex(r=>r.current);sel[wi]=i<0?0:i;}
    const rows=rowsFor(ws), c=counts(ws);
    const card=document.createElement("div");
    card.className="card"+(wi===active?" center":"");
    card.innerHTML=`
      <div class="head"><div class="stripe" style="background:${STRIPE[worstOf(c)]}"></div>
        ${ws.current?'<span class="cur">◆</span>':''}<span class="wsname">${ws.name}</span>
        <span class="headspace"></span><span class="panecount">${rows.filter(r=>r.type==='pane').length} panes</span></div>
      <div class="rollup">${rollupItem("block",c.block)}${rollupItem("work",c.work)}${rollupItem("done",c.done)}${rollupItem("idle",c.idle)}</div>
      <div class="body"></div>`;
    const body=card.querySelector(".body");
    rows.forEach((r,ri)=>{
      const dim=filter&&r.type==="pane"&&r.s!==filter;
      const row=document.createElement("div");
      row.className="row "+r.type+(wi===active&&ri===sel[wi]?" sel":"")+(r.current?" current":"");
      row.style.opacity=dim?.28:1;
      const gl=S[r.s];
      row.innerHTML = r.type==="tab"
        ? `<span class="arrow">${wi===active&&ri===sel[wi]?"›":""}</span><span class="tw">▸</span><span class="lbl">${r.label}</span><span class="meta">${r.meta}</span>`
        : `<span class="arrow">${wi===active&&ri===sel[wi]?"›":""}</span><span class="glyph ${gl.c}">${gl.g}</span><span class="lbl">${r.current?'◆ ':''}${r.label}</span><span class="meta">${r.meta}</span>`;
      row.addEventListener("click",()=>{active=wi;sel[wi]=ri;build();});
      body.appendChild(row);
    });
    track.appendChild(card);
  });
  center(); pagerBuild(); updateDetail(); updateFilters();
}
function center(){
  const CARD=400, GAP=26, stage=document.querySelector(".stage");
  const off = stage.clientWidth/2 - (active*(CARD+GAP) + CARD/2);
  track.style.transform=`translateX(${off}px)`;
  const c=track.children[active]; if(c){const s=c.querySelector(".row.sel"); if(s) s.scrollIntoView({block:"nearest"});}
}
function pagerBuild(){
  pager.innerHTML="";
  WORKSPACES.forEach((ws,wi)=>{
    const c=counts(ws), col=STRIPE[worstOf(c)];
    const d=document.createElement("div"); d.className="pd"+(wi===active?" on":"");
    d.innerHTML=`<span class="s" style="background:${col}"></span>${ws.name}`;
    d.addEventListener("click",()=>{active=wi;build();});
    pager.appendChild(d);
  });
}
function updateDetail(){
  const ws=WORKSPACES[active], rows=rowsFor(ws), r=rows[sel[active]];
  let parts=[`<b>${ws.name}</b>`];
  if(r.type==="tab") parts.push(`tab: ${r.label}`, r.meta.replace('p',' panes'));
  else parts.push(`pane: ${r.label}`, S[r.s].label);
  detailEl.innerHTML=parts.join(" · ");
}
function updateFilters(){
  const map={b:"block",w:"work",i:"idle",d:"done"};
  document.querySelectorAll(".chip").forEach(ch=>ch.classList.toggle("on",filter===map[ch.dataset.k]));
}
function flash(h){const f=document.getElementById("flash");f.innerHTML=h;f.classList.add("on");clearTimeout(f._t);f._t=setTimeout(()=>f.classList.remove("on"),1400);}
document.addEventListener("keydown",e=>{
  const k=e.key;
  if(k==="ArrowRight"){active=Math.min(active+1,WORKSPACES.length-1);clampSel();build();e.preventDefault();}
  else if(k==="ArrowLeft"){active=Math.max(active-1,0);clampSel();build();e.preventDefault();}
  else if(k==="ArrowDown"||k==="j"){move(1);e.preventDefault();}
  else if(k==="ArrowUp"||k==="k"){move(-1);e.preventDefault();}
  else if(k==="Enter"){const ws=WORKSPACES[active],r=rowsFor(ws)[sel[active]];flash(`switching to <b>${ws.name}</b> · ${r.label}`);e.preventDefault();}
  else if(k==="b")toggleFilter("block"); else if(k==="w")toggleFilter("work");
  else if(k==="i")toggleFilter("idle"); else if(k==="d")toggleFilter("done");
  else if(k==="Escape"){filter=null;build();}
});
function move(d){const n=rowsFor(WORKSPACES[active]).length;sel[active]=Math.max(0,Math.min(sel[active]+d,n-1));build();}
function clampSel(){const n=rowsFor(WORKSPACES[active]).length;if(sel[active]===undefined)sel[active]=0;sel[active]=Math.min(sel[active],n-1);}
function toggleFilter(f){filter=filter===f?null:f;build();}
build();
window.addEventListener("resize",center);
</script>
</body>
</html>

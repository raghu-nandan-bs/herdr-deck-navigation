<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>herdr · Deck — liquid-glass cover-flow concept</title>
<style>
  :root{
    --red:#ff6b8b; --yellow:#ffd479; --teal:#7fe3d4; --green:#8ee6a8; --grey:#9aa0b4;
    --accent:#ff9f6b;
    --sf:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
    --mono:"SF Mono","JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sf); color:#f4f5fb; overflow:hidden;
    background:
      radial-gradient(1200px 700px at 12% 15%, #5b3fb0 0%, transparent 55%),
      radial-gradient(1100px 800px at 88% 20%, #b0416f 0%, transparent 55%),
      radial-gradient(1000px 900px at 70% 95%, #2f6bd6 0%, transparent 55%),
      radial-gradient(900px 700px at 20% 90%, #1b9c8f 0%, transparent 50%),
      linear-gradient(135deg,#1a1730,#241b33 60%,#101423);
    -webkit-font-smoothing:antialiased;
  }
  .stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    perspective:1600px}
  .pile{position:relative; width:452px; height:66vh; max-height:580px; transform-style:preserve-3d}

  .card{
    position:absolute; left:0; top:0; width:452px; height:100%; border-radius:24px; overflow:hidden;
    background:rgba(24,22,38,.44);
    border:1px solid rgba(255,255,255,.16);
    backdrop-filter:blur(40px) saturate(180%); -webkit-backdrop-filter:blur(40px) saturate(180%);
    box-shadow:0 30px 90px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.22);
    display:flex; flex-direction:column;
    transition:transform .4s cubic-bezier(.2,.9,.3,1), opacity .4s, filter .4s;
    will-change:transform,opacity;
  }
  .card.back{pointer-events:auto; cursor:pointer}
  /* focused card: slide animates, but it becomes fully opaque & sharp instantly */
  .card.front{transition:transform .4s cubic-bezier(.2,.9,.3,1)}

  .card .stripe{position:absolute; left:0; top:0; bottom:0; width:5px; z-index:2}
  .card .head{padding:18px 22px 14px; border-bottom:1px solid rgba(255,255,255,.09);
    display:flex; align-items:center; gap:12px}
  .card .wsname{font-size:20px; font-weight:700; letter-spacing:.2px}
  .card .cur{color:var(--accent); font-size:15px}
  .head .grow{flex:1}
  .rollup{display:flex; gap:8px}
  .pill{display:flex; align-items:center; gap:5px; font-family:var(--mono); font-size:12px;
    padding:4px 9px; border-radius:999px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08); color:#d7dbec}
  .pill.z{opacity:.4}
  .dot{width:8px;height:8px;border-radius:50%}
  .d-block{background:var(--red)} .d-work{background:var(--yellow)}
  .d-done{background:var(--teal)} .d-idle{background:var(--green)} .d-unknown{background:var(--grey)}

  .rows{padding:10px 12px 16px; overflow-y:auto; scrollbar-width:thin}
  .rows::-webkit-scrollbar{width:7px}
  .rows::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14); border-radius:4px}
  .row{display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:12px; font-size:14px}
  .row.tab{font-weight:600; color:#eef0f8; margin-top:4px}
  .row.tab .chev{color:#9aa0b4; font-size:11px}
  .row.pane{padding-left:30px; color:#c7ccde; font-family:var(--mono); font-size:13px}
  .row .meta{margin-left:auto; font-family:var(--mono); font-size:11.5px; color:#9aa0b4}
  .row.sel{
    background:linear-gradient(90deg, rgba(255,159,107,.30), rgba(255,159,107,.14));
    border:1px solid rgba(255,159,107,.5);
    box-shadow:0 4px 16px rgba(255,159,107,.18), inset 0 1px 0 rgba(255,255,255,.16); color:#fff;
  }
  .row .rdot{width:9px;height:9px;border-radius:50%; flex:0 0 auto}

  .count{position:fixed; top:22px; left:0; right:0; text-align:center; font-family:var(--mono);
    font-size:12.5px; color:rgba(255,255,255,.6); z-index:50}
  .count b{color:#fff}
  .foot{position:fixed; bottom:22px; left:0; right:0; display:flex; justify-content:center; gap:20px;
    font-family:var(--mono); font-size:12px; color:rgba(255,255,255,.62); z-index:50}
  .foot .k{background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.14);
    border-radius:6px; padding:1px 7px; color:#fff}
</style>
</head>
<body>
  <div class="count" id="count"></div>
  <div class="stage"><div class="pile" id="pile"></div></div>
  <div class="foot">
    <span><span class="k">←</span> upcoming (left)</span>
    <span><span class="k">→</span> seen (right)</span>
    <span><span class="k">↑ ↓</span> within card</span>
    <span><span class="k">↵</span> switch</span>
  </div>

<script>
const S={block:{d:"d-block"},work:{d:"d-work"},done:{d:"d-done"},idle:{d:"d-idle"},unknown:{d:"d-unknown"}};
const WS=[
  {name:"api", cur:true, tabs:[
    {name:"server", panes:[{n:"loadtest agent", s:"idle", m:"claude"},{n:"api", s:"work", m:"cargo"}]},
    {name:"build",  panes:[{n:"compiler", s:"work", m:"watch"}]},
    {name:"editor", panes:[{n:"nvim", s:"idle", m:"—"}]},
  ]},
  {name:"web", tabs:[
    {name:"dev-server", panes:[{n:"vite", s:"idle", m:"5173"}]},
    {name:"worker", panes:[{n:"queue", s:"block", m:"paused"},{n:"logs", s:"work", m:"tail"}]},
  ]},
  {name:"infra", tabs:[
    {name:"shell", panes:[{n:"zsh", s:"unknown", m:"—"}]},
    {name:"deploy", panes:[{n:"terraform", s:"done", m:"applied"}]},
  ]},
  {name:"data", tabs:[
    {name:"notebook", panes:[{n:"jupyter", s:"work", m:":8888"}]},
    {name:"db", panes:[{n:"psql", s:"idle", m:"ro"}]},
  ]},
];
const STRIPE={block:"var(--red)",work:"var(--yellow)",done:"var(--teal)",idle:"var(--green)",unknown:"var(--grey)"};
let active=0;
let sel=WS.map(()=>1);
const cards=[];

function rows(ws){const r=[{t:"ws"}]; ws.tabs.forEach((t,ti)=>{r.push({t:"tab",ti}); t.panes.forEach((p,pi)=>r.push({t:"pane",ti,pi}));}); return r;}
function counts(ws){const c={block:0,work:0,done:0,idle:0,unknown:0}; ws.tabs.forEach(t=>t.panes.forEach(p=>c[p.s]++)); return c;}
function worst(ws){const c=counts(ws); for(const k of["block","work","done","idle","unknown"]) if(c[k])return k; return "unknown";}
function pill(k,g,n){return `<span class="pill ${n?'':'z'}"><span class="dot d-${k}"></span>${n}</span>`;}

function build(){
  const pile=document.getElementById("pile"); pile.innerHTML="";
  WS.forEach((ws,i)=>{
    const c=counts(ws), rs=rows(ws);
    const card=document.createElement("div"); card.className="card";
    card.innerHTML=`
      <div class="stripe" style="background:${STRIPE[worst(ws)]}"></div>
      <div class="head">
        <span class="wsname">${ws.name}</span>${ws.cur?'<span class="cur">◆</span>':''}
        <span class="grow"></span>
        <div class="rollup">${pill("block","◉",c.block)}${pill("work","◍",c.work)}${pill("done","●",c.done)}${pill("idle","✓",c.idle)}</div>
      </div>
      <div class="rows"></div>`;
    const rowsEl=card.querySelector(".rows");
    rs.forEach((r,ri)=>{
      const el=document.createElement("div"); el.dataset.ri=ri;
      if(r.t==="ws"){ el.className="row tab"; el.innerHTML=`<span class="chev">◆</span> workspace`; }
      else if(r.t==="tab"){ const t=ws.tabs[r.ti]; el.className="row tab"; el.innerHTML=`<span class="chev">▸</span> ${t.name}<span class="meta">${t.panes.length}p</span>`; }
      else { const p=ws.tabs[r.ti].panes[r.pi]; el.className="row pane"; el.innerHTML=`<span class="rdot ${S[p.s].d}"></span> ${p.n}<span class="meta">${p.m}</span>`; }
      rowsEl.appendChild(el);
    });
    card.onclick=()=>{ if(i!==active){ active=i; layout(); } };
    cards[i]=card; pile.appendChild(card);
  });
  layout();
}

function layout(){
  WS.forEach((ws,i)=>{
    const card=cards[i];
    const k=i-active;                       // >0 upcoming (left), <0 seen (right), 0 front
    let x,z,scale,rot,op,bl;
    if(k===0){ x=0; z=0; scale=1; rot=0; op=1; bl=0; }
    else{
      const dir = k>0 ? -1 : 1;             // upcoming go left, seen go right
      const n = Math.abs(k);
      x   = dir * (232 + (n-1)*46);
      z   = -90 - (n-1)*70;                 // recede into the screen
      scale = Math.max(0.62, 1 - n*0.06);
      rot = dir * -22;                      // angle toward the center
      op  = Math.max(0, 1 - n*0.26);
      bl  = Math.min(n*1.3, 4.5);
    }
    card.style.transform=`translateX(${x}px) translateZ(${z}px) rotateY(${rot}deg) scale(${scale})`;
    card.style.opacity=op;
    card.style.filter = k===0 ? "none" : `blur(${bl}px)`;
    card.style.zIndex = 100 - Math.abs(k);
    card.className = "card " + (k===0 ? "front" : "back");
    card.querySelectorAll(".row").forEach(el=> el.classList.toggle("sel", k===0 && Number(el.dataset.ri)===sel[i]));
    if(k===0){ const s=card.querySelector(".row.sel"); if(s) s.scrollIntoView({block:"nearest"}); }
  });
  document.getElementById("count").innerHTML=`<b>${WS[active].name}</b> &nbsp;·&nbsp; ${active+1} of ${WS.length}`;
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){ active=Math.min(active+1, WS.length-1); layout(); e.preventDefault(); }
  else if(e.key==="ArrowLeft"){ active=Math.max(active-1, 0); layout(); e.preventDefault(); }
  else if(e.key==="ArrowDown"||e.key==="j"){ sel[active]=Math.min(sel[active]+1, rows(WS[active]).length-1); layout(); e.preventDefault(); }
  else if(e.key==="ArrowUp"||e.key==="k"){ sel[active]=Math.max(sel[active]-1,0); layout(); e.preventDefault(); }
});
build();
</script>
</body>
</html>
